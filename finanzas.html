<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Personales</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0d0d14; --surface: #16161f; --surface2: #1e1e2a; --border: #2a2a38;
    --text: #f0f0f5; --muted: #7070a0; --green: #00e5a0; --red: #ff4d6d;
    --blue: #4da6ff; --yellow: #ffd166; --purple: #c77dff; --orange: #ff9f43;
    --teal: #26d5c8; --pink: #ff6b9d;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 0; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); padding: 16px 0; margin-right: 32px; }
  .nav-brand span { color: var(--green); }
  .nav-tabs { display: flex; gap: 0; overflow-x: auto; }
  .nav-tab { padding: 18px 18px; font-size: 14px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--green); border-bottom-color: var(--green); }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .btn-add { background: var(--green); color: #000; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .sync-dot.ok { background: var(--green); }
  .sync-dot.err { background: var(--red); }
  .sync-dot.loading { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .view { display: none; padding: 32px 24px; max-width: 1100px; margin: 0 auto; }
  .view.active { display: block; }

  .month-header { text-align: center; margin-bottom: 32px; }
  .month-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .month-title { font-size: 52px; font-weight: 800; letter-spacing: -2px; }
  .month-title span { color: var(--green); }
  .month-tc { font-size: 13px; color: var(--muted); margin-top: 8px; }
  .month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 12px; }
  .month-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .month-btn:hover { border-color: var(--green); }

  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; position: relative; overflow: hidden; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .kpi-card.income::before { background: var(--green); }
  .kpi-card.expense::before { background: var(--red); }
  .kpi-card.balance::before { background: var(--blue); }
  .kpi-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .kpi-value { font-size: 30px; font-weight: 700; letter-spacing: -1px; }
  .kpi-card.income .kpi-value { color: var(--green); }
  .kpi-card.expense .kpi-value { color: var(--red); }
  .kpi-card.balance .kpi-value { color: var(--blue); }
  .kpi-usd { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink:0; }

  .bar-chart { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 32px; }
  .bar-row { display: grid; grid-template-columns: 140px 1fr 110px; align-items: center; gap: 12px; margin-bottom: 10px; }
  .bar-name { font-size: 13px; color: var(--muted); text-align: right; }
  .bar-track { background: var(--surface2); border-radius: 3px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
  .bar-amount { font-size: 13px; font-weight: 600; text-align: right; }

  .txn-list { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .txn-group-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background: var(--surface2); }
  .txn-group-tag { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
  .txn-group-total { font-size: 15px; font-weight: 700; }
  .txn-group-total.income-color { color: var(--green); }
  .txn-group-total.expense-color { color: var(--red); }
  .txn-row { display: grid; grid-template-columns: 60px 1fr auto; align-items: center; gap: 12px; padding: 12px 20px; border-top: 1px solid var(--border); }
  .txn-date { font-size: 12px; color: var(--muted); }
  .txn-desc { font-size: 14px; }
  .txn-amount { font-size: 14px; font-weight: 600; }
  .txn-amount.income-color { color: var(--green); }
  .txn-amount.expense-color { color: var(--red); }
  .del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 6px; opacity: 0; border-radius: 4px; }
  .txn-row:hover .del-btn { opacity: 1; }
  .del-btn:hover { background: var(--red); color: #fff; opacity: 1; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 440px; max-width: 95vw; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .form-row { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; letter-spacing: 1px; text-transform: uppercase; }
  .form-input, .form-select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; }
  .form-input:focus, .form-select:focus { border-color: var(--green); }
  .form-row-split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 9px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .btn-save { background: var(--green); color: #000; border: none; padding: 9px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

  .year-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
  .month-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; cursor: pointer; transition: border-color 0.2s; }
  .month-card:hover { border-color: var(--green); }
  .month-card .mc-name { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
  .month-card .mc-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .month-card .mc-label { color: var(--muted); }
  .mc-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .mc-bar-fill { height: 100%; background: var(--green); border-radius: 2px; }

  .converter-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .tc-result { background: var(--surface2); border-radius: 8px; padding: 16px; margin-top: 16px; }
  .tc-result-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .tc-result-row:last-child { border-bottom: none; font-weight: 600; }

  .empty { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 14px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-size: 13px; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 640px) {
    .kpi-grid { grid-template-columns: 1fr; }
    .year-grid { grid-template-columns: repeat(2,1fr); }
    .bar-row { grid-template-columns: 80px 1fr 85px; }
    .month-title { font-size: 36px; }
    .nav-tab { padding: 16px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">fin<span>.</span></div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="showView('resumen')">Resumen</div>
    <div class="nav-tab" onclick="showView('ingresos')">Ingresos</div>
    <div class="nav-tab" onclick="showView('gastos')">Gastos</div>
    <div class="nav-tab" onclick="showView('anual')">Anual</div>
    <div class="nav-tab" onclick="showView('conversor')">USD</div>
  </div>
  <div class="nav-right">
    <div class="sync-dot loading" id="sync-dot" title="Sincronizando..."></div>
    <button class="btn-add" onclick="openModal()">+ Agregar</button>
  </div>
</nav>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Nueva transacción</div>
    <div class="form-row">
      <label class="form-label">Tipo</label>
      <select class="form-select" id="f-type" onchange="updateCategories()">
        <option value="ingreso">Ingreso</option>
        <option value="gasto">Gasto</option>
      </select>
    </div>
    <div class="form-row-split">
      <div>
        <label class="form-label">Fecha</label>
        <input class="form-input" type="date" id="f-date">
      </div>
      <div>
        <label class="form-label">Monto (ARS)</label>
        <input class="form-input" type="number" id="f-amount" placeholder="0">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Categoría</label>
      <select class="form-select" id="f-cat"></select>
    </div>
    <div class="form-row">
      <label class="form-label">Descripción</label>
      <input class="form-input" type="text" id="f-desc" placeholder="Ej: Sueldo de mayo">
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="saveTransaction()">Guardar</button>
    </div>
  </div>
</div>

<div class="view active" id="view-resumen">
  <div class="month-header">
    <div class="month-label">Resumen financiero personal</div>
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">&#8592;</button>
      <div class="month-title" id="month-display"></div>
      <button class="month-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="month-tc" id="tc-display"></div>
  </div>
  <div class="kpi-grid">
    <div class="kpi-card income"><div class="kpi-label">Total ingresos</div><div class="kpi-value" id="kpi-income">$0</div><div class="kpi-usd" id="kpi-income-usd">= USD 0</div></div>
    <div class="kpi-card expense"><div class="kpi-label">Total gastos</div><div class="kpi-value" id="kpi-expense">$0</div><div class="kpi-usd" id="kpi-expense-usd">= USD 0</div></div>
    <div class="kpi-card balance"><div class="kpi-label">Balance neto</div><div class="kpi-value" id="kpi-balance">$0</div><div class="kpi-usd" id="kpi-balance-usd">= USD 0</div></div>
  </div>
  <div class="section-title"><span class="dot"></span> Distribución de gastos por categoría</div>
  <div class="bar-chart" id="bar-chart"></div>
  <div class="section-title"><span class="dot" style="background:var(--red)"></span> Gastos del mes <span id="res-total-exp" style="margin-left:auto;font-size:13px;color:var(--muted);font-weight:400"></span></div>
  <div id="expense-list"></div>
</div>

<div class="view" id="view-ingresos">
  <div class="section-title" style="margin-bottom:24px"><span class="dot"></span> Ingresos del mes</div>
  <div id="income-list"></div>
</div>

<div class="view" id="view-gastos">
  <div class="section-title" style="margin-bottom:24px"><span class="dot" style="background:var(--red)"></span> Gastos del mes</div>
  <div id="expense-list2"></div>
</div>

<div class="view" id="view-anual">
  <div class="section-title" style="margin-bottom:24px"><span class="dot" style="background:var(--blue)"></span> Resumen <span id="year-label" style="color:var(--muted);font-weight:400;font-size:14px;margin-left:4px"></span></div>
  <div class="year-grid" id="year-grid"></div>
</div>

<div class="view" id="view-conversor">
  <div class="section-title" style="margin-bottom:24px"><span class="dot" style="background:var(--yellow)"></span> Conversor ARS / USD</div>
  <div class="converter-card">
    <div class="form-row">
      <label class="form-label">Tipo de cambio (ARS por USD)</label>
      <input class="form-input" type="number" id="tc-rate" value="1420" oninput="updateConverter()">
    </div>
    <div class="form-row-split">
      <div><label class="form-label">ARS</label><input class="form-input" type="number" id="conv-ars" placeholder="0" oninput="convFromARS()"></div>
      <div><label class="form-label">USD</label><input class="form-input" type="number" id="conv-usd" placeholder="0" oninput="convFromUSD()"></div>
    </div>
    <div class="tc-result" id="month-usd-summary"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tgflxbgnputazidzaerm.supabase.co';
const SUPABASE_KEY = 'sb_secret_0DHPJ6mCXdSoJC-97XEi6A_7iLV13KI';
const HEADERS = { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };

const CAT_INCOME = ['Contenido / Publicidad','Campañas únicas','Marketing de afiliados','Alquileres','Sueldo','Freelance','Inversiones','Otros ingresos'];
const CAT_EXPENSE = ['Hogar / Alquiler','Impuestos','Laboral','Comida','Transporte','Servicios','Educación','Mascotas','Viajes','Salud','Mercado','Otros'];
const CAT_COLORS = {
  'Hogar / Alquiler':'#ffd166','Impuestos':'#e0aeff','Laboral':'#c77dff','Comida':'#ff6b9d',
  'Transporte':'#4da6ff','Servicios':'#26d5c8','Educación':'#a78bfa','Mascotas':'#fb923c',
  'Viajes':'#fde047','Salud':'#4ade80','Mercado':'#2dd4bf','Otros':'#94a3b8',
  'Contenido / Publicidad':'#00e5a0','Campañas únicas':'#4da6ff','Marketing de afiliados':'#c77dff',
  'Alquileres':'#ff9f43','Sueldo':'#00e5a0','Freelance':'#26d5c8','Inversiones':'#ffd166','Otros ingresos':'#94a3b8'
};
const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let transactions = [];
let tc = parseFloat(localStorage.getItem('fin_tc') || '1420');
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

function setSyncDot(state) {
  const d = document.getElementById('sync-dot');
  d.className = 'sync-dot ' + state;
  d.title = state === 'ok' ? 'Sincronizado' : state === 'err' ? 'Error de conexión' : 'Sincronizando...';
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color || 'var(--border)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function loadTransactions() {
  setSyncDot('loading');
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/transactions?select=*&order=date.desc`, { headers: HEADERS });
    if (!r.ok) throw new Error(await r.text());
    transactions = await r.json();
    setSyncDot('ok');
    render();
  } catch(e) {
    setSyncDot('err');
    showToast('Error al cargar datos', 'var(--red)');
    console.error(e);
  }
}

async function saveTransaction() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = 'Guardando...';
  const date = document.getElementById('f-date').value;
  const amount = parseFloat(document.getElementById('f-amount').value) || 0;
  if (!date || !amount) { btn.disabled = false; btn.textContent = 'Guardar'; return; }
  const d = new Date(date + 'T12:00:00');
  const t = {
    id: Date.now(),
    type: document.getElementById('f-type').value,
    date,
    amount,
    cat: document.getElementById('f-cat').value,
    description: document.getElementById('f-desc').value || document.getElementById('f-cat').value,
    month: d.getMonth(),
    year: d.getFullYear()
  };
  try {
    setSyncDot('loading');
    const r = await fetch(`${SUPABASE_URL}/rest/v1/transactions`, {
      method: 'POST', headers: { ...HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify(t)
    });
    if (!r.ok) throw new Error(await r.text());
    transactions.unshift(t);
    setSyncDot('ok');
    showToast('Guardado ✓', 'var(--green)');
    closeModal();
    render();
  } catch(e) {
    setSyncDot('err');
    showToast('Error al guardar', 'var(--red)');
    console.error(e);
  }
  btn.disabled = false; btn.textContent = 'Guardar';
}

async function deleteTransaction(id) {
  if (!confirm('¿Eliminar esta transacción?')) return;
  try {
    setSyncDot('loading');
    const r = await fetch(`${SUPABASE_URL}/rest/v1/transactions?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
    if (!r.ok) throw new Error(await r.text());
    transactions = transactions.filter(t => t.id !== id);
    setSyncDot('ok');
    showToast('Eliminado', 'var(--muted)');
    render();
  } catch(e) {
    setSyncDot('err');
    showToast('Error al eliminar', 'var(--red)');
  }
}

function getMonthData(m, y) { return transactions.filter(t => t.month === m && t.year === y); }
function fmt(n) { return '$' + Math.round(n).toLocaleString('es-AR'); }
function fmtUSD(n) { return 'USD ' + Math.round(n / tc).toLocaleString('es-AR'); }

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  ['resumen','ingresos','gastos','anual','conversor'].forEach((n,i) => {
    if (n === name) document.querySelectorAll('.nav-tab')[i].classList.add('active');
  });
  render();
}

function changeMonth(d) {
  currentMonth += d;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  render();
}

function openModal() {
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-amount').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-type').value = 'gasto';
  updateCategories();
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function updateCategories() {
  const type = document.getElementById('f-type').value;
  document.getElementById('f-cat').innerHTML = (type === 'ingreso' ? CAT_INCOME : CAT_EXPENSE)
    .map(c => `<option value="${c}">${c}</option>`).join('');
}

function render() {
  const txns = getMonthData(currentMonth, currentYear);
  const income = txns.filter(t => t.type === 'ingreso').reduce((s,t) => s + t.amount, 0);
  const expense = txns.filter(t => t.type === 'gasto').reduce((s,t) => s + t.amount, 0);
  const balance = income - expense;

  document.getElementById('month-display').innerHTML = `${MONTHS_ES[currentMonth]} <span>${currentYear}</span>`;
  document.getElementById('tc-display').textContent = `TC: $${Math.round(tc).toLocaleString('es-AR')} por USD · Período completo`;
  document.getElementById('kpi-income').textContent = fmt(income);
  document.getElementById('kpi-income-usd').textContent = '≈ ' + fmtUSD(income);
  document.getElementById('kpi-expense').textContent = fmt(expense);
  document.getElementById('kpi-expense-usd').textContent = '≈ ' + fmtUSD(expense);
  document.getElementById('kpi-balance').textContent = fmt(balance);
  document.getElementById('kpi-balance-usd').textContent = '≈ ' + fmtUSD(balance);

  const expEl = document.getElementById('res-total-exp');
  if (expEl) expEl.textContent = expense > 0 ? `${fmt(expense)} · ${fmtUSD(expense)}` : '';

  renderBarChart(txns);
  renderTxnList('expense-list', txns.filter(t => t.type === 'gasto'), 'gasto');
  renderTxnList('income-list', txns.filter(t => t.type === 'ingreso'), 'ingreso');
  renderTxnList('expense-list2', txns.filter(t => t.type === 'gasto'), 'gasto');
  renderAnual();
  renderConverterSummary();
}

function renderBarChart(txns) {
  const byCat = {};
  txns.filter(t => t.type === 'gasto').forEach(t => { byCat[t.cat] = (byCat[t.cat] || 0) + t.amount; });
  const sorted = Object.entries(byCat).sort((a,b) => b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;
  document.getElementById('bar-chart').innerHTML = sorted.length
    ? sorted.map(([cat, amt]) => {
        const pct = Math.round(amt / max * 100);
        const color = CAT_COLORS[cat] || '#94a3b8';
        return `<div class="bar-row"><div class="bar-name">${cat}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-amount" style="color:${color}">${fmt(amt)}</div></div>`;
      }).join('')
    : '<div class="empty">Sin gastos este mes</div>';
}

function renderTxnList(containerId, txns, type) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!txns.length) { el.innerHTML = '<div class="empty">Sin registros este mes. Usá + para agregar.</div>'; return; }
  const byCat = {};
  txns.forEach(t => { if (!byCat[t.cat]) byCat[t.cat] = []; byCat[t.cat].push(t); });
  const colorClass = type === 'ingreso' ? 'income-color' : 'expense-color';
  const sign = type === 'ingreso' ? '+' : '';
  el.innerHTML = Object.entries(byCat).map(([cat, items]) => {
    const total = items.reduce((s,t) => s + t.amount, 0);
    const color = CAT_COLORS[cat] || '#94a3b8';
    const rows = [...items].sort((a,b) => a.date.localeCompare(b.date)).map(t => {
      const d = t.date.slice(5).replace('-','/');
      return `<div class="txn-row"><div class="txn-date">${d}</div><div class="txn-desc">${t.description}</div><div style="display:flex;align-items:center;gap:8px"><div class="txn-amount ${colorClass}">${sign}${fmt(t.amount)}</div><button class="del-btn" onclick="deleteTransaction(${t.id})">✕</button></div></div>`;
    }).join('');
    return `<div class="txn-list"><div class="txn-group-header"><span class="txn-group-tag" style="background:${color}22;color:${color}">${cat}</span><span class="txn-group-total ${colorClass}">${sign}${fmt(total)}</span></div>${rows}</div>`;
  }).join('');
}

function renderAnual() {
  document.getElementById('year-label').textContent = currentYear;
  document.getElementById('year-grid').innerHTML = MONTHS_ES.map((name, m) => {
    const txns = getMonthData(m, currentYear);
    const inc = txns.filter(t => t.type === 'ingreso').reduce((s,t) => s + t.amount, 0);
    const exp = txns.filter(t => t.type === 'gasto').reduce((s,t) => s + t.amount, 0);
    const bal = inc - exp;
    const pct = inc > 0 ? Math.min(Math.round(bal / inc * 100), 100) : 0;
    return `<div class="month-card" onclick="currentMonth=${m};showView('resumen')" style="${m===currentMonth?'border-color:var(--green)':''}"><div class="mc-name">${name} ${currentYear}</div><div class="mc-row"><span class="mc-label">Ingresos</span><span style="color:var(--green)">${fmt(inc)}</span></div><div class="mc-row"><span class="mc-label">Gastos</span><span style="color:var(--red)">${fmt(exp)}</span></div><div class="mc-row"><span class="mc-label">Balance</span><span style="color:${bal>=0?'var(--blue)':'var(--red)'}">${fmt(bal)}</span></div><div class="mc-bar"><div class="mc-bar-fill" style="width:${pct}%"></div></div></div>`;
  }).join('');
}

function renderConverterSummary() {
  const txns = getMonthData(currentMonth, currentYear);
  const inc = txns.filter(t => t.type === 'ingreso').reduce((s,t) => s + t.amount, 0);
  const exp = txns.filter(t => t.type === 'gasto').reduce((s,t) => s + t.amount, 0);
  const bal = inc - exp;
  const el = document.getElementById('month-usd-summary');
  if (el) el.innerHTML = `<div style="font-size:13px;color:var(--muted);margin-bottom:10px">Resumen del mes en USD</div><div class="tc-result-row"><span>Ingresos</span><span style="color:var(--green)">${fmtUSD(inc)}</span></div><div class="tc-result-row"><span>Gastos</span><span style="color:var(--red)">${fmtUSD(exp)}</span></div><div class="tc-result-row"><span>Balance neto</span><span style="color:var(--blue)">${fmtUSD(bal)}</span></div>`;
}

function updateConverter() {
  tc = parseFloat(document.getElementById('tc-rate').value) || 1420;
  localStorage.setItem('fin_tc', tc);
  document.getElementById('tc-display').textContent = `TC: $${Math.round(tc).toLocaleString('es-AR')} por USD · Período completo`;
  renderConverterSummary();
  render();
}
function convFromARS() {
  const v = parseFloat(document.getElementById('conv-ars').value) || 0;
  document.getElementById('conv-usd').value = (v / tc).toFixed(2);
}
function convFromUSD() {
  const v = parseFloat(document.getElementById('conv-usd').value) || 0;
  document.getElementById('conv-ars').value = Math.round(v * tc);
}

updateCategories();
document.getElementById('tc-rate').value = tc;
loadTransactions();
</script>
</body>
</html>
